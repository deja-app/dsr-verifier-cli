name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Pinned version is always tested first; other versions catch
        # any forward-compatibility issues before they become blockers.
        go: ['1.22.3', '1.23.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify module integrity
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Vector parity (vendored vs authoritative SHA-256)
        # Asserts the vendored copy of rv-canonical-vector.json has not drifted
        # from the auditor-pinned SHA-256.  When both repos are available (e.g.
        # local dev), run 'make verify-vector-parity WALLOW_REPO=<path>' for a
        # byte-level diff against the wallow repo's docs/dsr/ copy.
        run: |
          EXPECTED="39d74fec985b809b837718f1ba1295943dc78f3da766fc4d233d1716d6d31aa3"
          ACTUAL=$(sha256sum testdata/protocol/rv-canonical-vector.json | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "RV vector file SHA-256 mismatch — vendored copy has drifted"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "vector-parity OK"

      - name: Test
        run: go test -race -count=1 -timeout=120s ./...

      - name: Build (host platform)
        run: |
          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -X github.com/deja-app/dsr-verifier-cli/internal/cli.BuildCommit=$(git rev-parse --short HEAD)" \
            ./cmd/dsr-verifier-cli

  cross-compile:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    env:
      CGO_ENABLED: '0'
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.3'
          cache: true

      - name: Build
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -X github.com/deja-app/dsr-verifier-cli/internal/cli.BuildCommit=$(git rev-parse --short HEAD)" \
            -o "dsr-verifier-cli${EXT}" \
            ./cmd/dsr-verifier-cli
