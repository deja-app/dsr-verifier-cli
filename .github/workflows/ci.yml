name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Pinned version is always tested first; other versions catch
        # any forward-compatibility issues before they become blockers.
        go: ['1.22.3', '1.23.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify module integrity
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Vector parity (vendored copy byte-identical to wallow authoritative)
        # Asserts the vendored copy of rv-canonical-vector.json is byte-identical
        # to docs/dsr/rv-canonical-vector.json in the wallow monorepo.
        # The file SHA-256 below is computed from the wallow authoritative copy;
        # update it here whenever you update the wallow source, and update the
        # CLI's CanonicalPayload(RV) accordingly so the Go golden tests still pass.
        # When both repos are available locally: make verify-vector-parity WALLOW_REPO=<path>
        run: |
          EXPECTED="cb4f13d2a9eb6667e01089321c9553812615c2866231e2410d550949c26b13d6"
          ACTUAL=$(sha256sum testdata/protocol/rv-canonical-vector.json | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "RV vector file SHA-256 mismatch — vendored copy has drifted from wallow authoritative"
            echo "  expected (wallow): $EXPECTED"
            echo "  actual  (cli):     $ACTUAL"
            echo "  Fix: copy docs/dsr/rv-canonical-vector.json from wallow, update rvCanonical() in the CLI, and update this hash."
            exit 1
          fi
          echo "vector-parity OK (cb4f13d2)"

      - name: Test
        run: go test -race -count=1 -timeout=120s ./...

      - name: Build (host platform)
        run: |
          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -X github.com/deja-app/dsr-verifier-cli/internal/cli.BuildCommit=$(git rev-parse --short HEAD)" \
            ./cmd/dsr-verifier-cli

  cross-compile:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    env:
      CGO_ENABLED: '0'
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.3'
          cache: true

      - name: Build
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -X github.com/deja-app/dsr-verifier-cli/internal/cli.BuildCommit=$(git rev-parse --short HEAD)" \
            -o "dsr-verifier-cli${EXT}" \
            ./cmd/dsr-verifier-cli
