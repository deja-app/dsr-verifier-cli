# Reference workflow for github.com/deja-app/homebrew-tap
#
# Copy this file to:
#   .github/workflows/update-formula.yml
# in the deja-app/homebrew-tap repository.
#
# This workflow listens for the "new-release" repository_dispatch event
# sent by the dsr-verifier-cli release pipeline and updates the formula
# with the new version and SHA-256 checksums.

name: Update dsr-verifier-cli formula

on:
  repository_dispatch:
    types: [new-release]

jobs:
  update:
    name: Update formula to ${{ github.event.client_payload.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256_DARWIN_AMD64: ${{ github.event.client_payload.sha256_darwin_amd64 }}
          SHA256_DARWIN_ARM64: ${{ github.event.client_payload.sha256_darwin_arm64 }}
          SHA256_LINUX_AMD64: ${{ github.event.client_payload.sha256_linux_amd64 }}
          SHA256_LINUX_ARM64: ${{ github.event.client_payload.sha256_linux_arm64 }}
        run: |
          # Strip leading 'v' from version for the formula's version field.
          SEMVER="${VERSION#v}"
          sed -i "s|version \"[0-9.]*\"|version \"${SEMVER}\"|g" Formula/dsr-verifier-cli.rb

          # Replace sha256 values for each platform.  The formula uses a URL
          # line containing the platform slug immediately above each sha256
          # line, so we match URL+sha256 as a unit.  This handles both the
          # REPLACE_WITH_SHA256_* placeholder form (first release) and the
          # existing 64-char hex form (subsequent releases).
          python3 << 'PYEOF'
          import re, os

          formula = open('Formula/dsr-verifier-cli.rb').read()
          mapping = {
              'darwin-arm64': os.environ['SHA256_DARWIN_ARM64'],
              'darwin-amd64': os.environ['SHA256_DARWIN_AMD64'],
              'linux-arm64':  os.environ['SHA256_LINUX_ARM64'],
              'linux-amd64':  os.environ['SHA256_LINUX_AMD64'],
          }
          for arch, sha in mapping.items():
              formula = re.sub(
                  rf'(url "[^"]*{re.escape(arch)}[^"]*"\n\s+)sha256 "[^"]*"',
                  lambda m, s=sha: m.group(1) + f'sha256 "{s}"',
                  formula,
              )
          open('Formula/dsr-verifier-cli.rb', 'w').write(formula)
          PYEOF

          echo "Formula after update:"
          grep -E "version|sha256|url" Formula/dsr-verifier-cli.rb

      - name: Commit and push
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dsr-verifier-cli.rb
          git commit -m "chore: bump dsr-verifier-cli to ${VERSION}"
          git push
